<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Souls — Flowchart</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #0f0f0f;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }
    h1 {
      text-align: center;
      font-size: 22px;
      letter-spacing: 4px;
      color: #5DCAA5;
      margin-bottom: 4px;
    }
    p.sub {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
      letter-spacing: 2px;
    }
    .chart-wrap {
      max-width: 720px;
      margin: 0 auto;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      overflow-x: auto;
    }
    svg text { font-family: 'Courier New', monospace; }

    /* Color ramps — light on dark */
    .c-teal rect, .c-teal circle, .c-teal ellipse  { fill: #085041; stroke: #5DCAA5; }
    .c-teal text { fill: #9FE1CB; }
    .c-purple rect { fill: #26215C; stroke: #7F77DD; }
    .c-purple text { fill: #CECBF6; }
    .c-gray rect  { fill: #2C2C2A; stroke: #5F5E5A; }
    .c-gray text  { fill: #D3D1C7; }
    .c-amber rect { fill: #412402; stroke: #BA7517; }
    .c-amber text { fill: #FAC775; }
    .c-blue rect  { fill: #042C53; stroke: #378ADD; }
    .c-blue text  { fill: #B5D4F4; }
    .c-coral rect { fill: #4A1B0C; stroke: #D85A30; }
    .c-coral text { fill: #F5C4B3; }
    .c-red rect   { fill: #501313; stroke: #A32D2D; }
    .c-red text   { fill: #F7C1C1; }

    .th { font-size: 14px; font-weight: bold; }
    .ts { font-size: 12px; font-weight: normal; }
    .arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
    .node { cursor: pointer; }
    .node:hover rect { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>⚔ TERMINAL SOULS ⚔</h1>
  <p class="sub">CODE FLOWCHART — Luis Gonzales &amp; Carlos Muñoz</p>
  <div class="chart-wrap">
<svg width="100%" viewBox="0 0 680 1620">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- INICIO -->
  <g class="c-teal">
    <rect x="240" y="20" width="200" height="44" rx="22" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">START</text>
  </g>
  <line x1="340" y1="64" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

  <!-- Variables globales -->
  <g class="c-purple">
    <rect x="150" y="90" width="380" height="72" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="112" text-anchor="middle" dominant-baseline="central">Global variables</text>
    <text class="ts" x="340" y="132" text-anchor="middle" dominant-baseline="central">hero_hp=100 · enemy_hp=120 · potions=3 · enemy_potions=1</text>
    <text class="ts" x="340" y="150" text-anchor="middle" dominant-baseline="central">Imported: import random</text>
  </g>
  <line x1="340" y1="162" x2="340" y2="188" class="arr" marker-end="url(#arrow)"/>

  <!-- Imprimir bienvenida -->
  <g class="c-gray">
    <rect x="200" y="188" width="280" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="206" text-anchor="middle" dominant-baseline="central">Print welcome message</text>
    <text class="ts" x="340" y="222" text-anchor="middle" dominant-baseline="central">TERMINAL SOULS title</text>
  </g>
  <line x1="340" y1="232" x2="340" y2="258" class="arr" marker-end="url(#arrow)"/>

  <!-- WHILE loop -->
  <g class="c-amber">
    <rect x="190" y="258" width="300" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="278" text-anchor="middle" dominant-baseline="central">while not check_winner()</text>
    <text class="ts" x="340" y="298" text-anchor="middle" dominant-baseline="central">hero_hp &gt; 0 AND enemy_hp &gt; 0?</text>
  </g>

  <line x1="490" y1="286" x2="560" y2="286" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
  <text class="ts" x="498" y="278" dominant-baseline="central" fill="#888">No</text>
  <line x1="560" y1="286" x2="560" y2="1490" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="560" y1="1490" x2="510" y2="1490" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>

  <line x1="340" y1="314" x2="340" y2="340" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="330" dominant-baseline="central" fill="#888">Yes</text>

  <!-- show_status() -->
  <g class="c-blue">
    <rect x="180" y="340" width="320" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="360" text-anchor="middle" dominant-baseline="central">show_status()</text>
    <text class="ts" x="340" y="378" text-anchor="middle" dominant-baseline="central">Prints hero_hp, enemy_hp, potions, health_bar()</text>
  </g>
  <line x1="340" y1="396" x2="340" y2="422" class="arr" marker-end="url(#arrow)"/>

  <!-- health_bar() -->
  <g class="c-gray">
    <rect x="40" y="422" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="150" y="442" text-anchor="middle" dominant-baseline="central">health_bar(hp, max_hp)</text>
    <text class="ts" x="150" y="460" text-anchor="middle" dominant-baseline="central">Returns visual bar █ and -</text>
  </g>

  <!-- generate_damage() -->
  <g class="c-gray">
    <rect x="420" y="422" width="220" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="530" y="442" text-anchor="middle" dominant-baseline="central">generate_damage(min,max)</text>
    <text class="ts" x="530" y="460" text-anchor="middle" dominant-baseline="central">Returns random.randint(min,max)</text>
  </g>
  <line x1="340" y1="422" x2="260" y2="450" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
  <line x1="340" y1="422" x2="418" y2="450" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
  <line x1="150" y1="478" x2="150" y2="510" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="150" y1="510" x2="310" y2="510" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
  <line x1="530" y1="478" x2="530" y2="510" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="530" y1="510" x2="370" y2="510" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>

  <!-- player_turn() -->
  <g class="c-blue">
    <rect x="180" y="510" width="320" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="532" text-anchor="middle" dominant-baseline="central">player_turn()</text>
  </g>
  <line x1="340" y1="554" x2="340" y2="580" class="arr" marker-end="url(#arrow)"/>

  <!-- Input jugador -->
  <g class="c-purple">
    <rect x="190" y="580" width="300" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="598" text-anchor="middle" dominant-baseline="central">option = input()</text>
    <text class="ts" x="340" y="616" text-anchor="middle" dominant-baseline="central">Reads player choice: 1, 2 or 3</text>
  </g>
  <line x1="340" y1="624" x2="340" y2="650" class="arr" marker-end="url(#arrow)"/>

  <!-- Decision -->
  <g class="c-amber">
    <rect x="205" y="650" width="270" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="672" text-anchor="middle" dominant-baseline="central">Which option?</text>
  </g>

  <!-- Rama 1: Attack -->
  <line x1="205" y1="672" x2="80" y2="672" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="80" y1="672" x2="80" y2="730" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="87" y="665" dominant-baseline="central" fill="#888">1</text>
  <g class="c-coral">
    <rect x="30" y="730" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="750" text-anchor="middle" dominant-baseline="central">Attack</text>
    <text class="ts" x="110" y="768" text-anchor="middle" dominant-baseline="central">damage = generate_damage(10,25)</text>
  </g>
  <line x1="110" y1="786" x2="110" y2="820" class="arr" marker-end="url(#arrow)"/>
  <g class="c-coral">
    <rect x="30" y="820" width="160" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="110" y="842" text-anchor="middle" dominant-baseline="central">enemy_hp -= damage</text>
  </g>

  <!-- Rama 2: Heal -->
  <line x1="340" y1="694" x2="340" y2="730" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="715" dominant-baseline="central" fill="#888">2</text>
  <g class="c-teal">
    <rect x="215" y="730" width="250" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="752" text-anchor="middle" dominant-baseline="central">Heal — potions &gt; 0?</text>
  </g>
  <line x1="340" y1="774" x2="340" y2="800" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="790" fill="#888">Yes</text>
  <g class="c-teal">
    <rect x="215" y="800" width="250" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="820" text-anchor="middle" dominant-baseline="central">Heal (+20 HP)</text>
    <text class="ts" x="340" y="838" text-anchor="middle" dominant-baseline="central">potions -= 1 · hero_hp += 20 (max 100)</text>
  </g>
  <line x1="465" y1="752" x2="490" y2="752" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="490" y1="752" x2="490" y2="820" class="arr" marker-end="url(#arrow)" stroke="#A32D2D"/>
  <text class="ts" x="470" y="744" fill="#888">No</text>
  <g class="c-red">
    <rect x="478" y="820" width="112" height="36" rx="8" stroke-width="0.5"/>
    <text class="ts" x="534" y="838" text-anchor="middle" dominant-baseline="central">No potions msg</text>
  </g>

  <!-- Rama 3: Special -->
  <line x1="475" y1="672" x2="600" y2="672" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="600" y1="672" x2="600" y2="730" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="545" y="665" dominant-baseline="central" fill="#888">3</text>
  <g class="c-purple">
    <rect x="510" y="730" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="590" y="750" text-anchor="middle" dominant-baseline="central">Special ability</text>
    <text class="ts" x="590" y="768" text-anchor="middle" dominant-baseline="central">50% chance of failure</text>
  </g>
  <line x1="590" y1="786" x2="590" y2="810" class="arr" marker-end="url(#arrow)"/>
  <g class="c-amber">
    <rect x="510" y="810" width="160" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="590" y="832" text-anchor="middle" dominant-baseline="central">random.randint(1,2)==1?</text>
  </g>
  <line x1="590" y1="854" x2="590" y2="878" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="598" y="870" fill="#888">Yes</text>
  <g class="c-red">
    <rect x="518" y="878" width="144" height="36" rx="8" stroke-width="0.5"/>
    <text class="ts" x="590" y="896" text-anchor="middle" dominant-baseline="central">Miss — no damage</text>
  </g>
  <line x1="510" y1="832" x2="475" y2="832" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="475" y1="832" x2="475" y2="878" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="423" y="825" fill="#888">No</text>
  <g class="c-purple">
    <rect x="390" y="878" width="80" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="430" y="898" text-anchor="middle" dominant-baseline="central">Hit</text>
    <text class="ts" x="430" y="916" text-anchor="middle" dominant-baseline="central">dmg(30,50)</text>
  </g>

  <!-- Converge post player -->
  <line x1="110" y1="864" x2="110" y2="970" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="110" y1="970" x2="310" y2="970" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
  <line x1="340" y1="856" x2="340" y2="970" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="590" y1="934" x2="590" y2="970" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="590" y1="970" x2="370" y2="970" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>

  <!-- check_winner post player -->
  <g class="c-amber">
    <rect x="180" y="970" width="320" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="990" text-anchor="middle" dominant-baseline="central">check_winner()?</text>
    <text class="ts" x="340" y="1010" text-anchor="middle" dominant-baseline="central">hero_hp &lt;= 0 OR enemy_hp &lt;= 0</text>
  </g>
  <line x1="500" y1="998" x2="556" y2="998" class="arr" marker-end="url(#arrow)" stroke="#A32D2D"/>
  <text class="ts" x="504" y="990" dominant-baseline="central" fill="#888">True</text>
  <text class="ts" x="560" y="990" dominant-baseline="central" fill="#F7C1C1">→ break</text>
  <line x1="340" y1="1026" x2="340" y2="1052" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="1042" fill="#888">False</text>

  <!-- enemy_turn() -->
  <g class="c-blue">
    <rect x="180" y="1052" width="320" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="1074" text-anchor="middle" dominant-baseline="central">enemy_turn()</text>
  </g>
  <line x1="340" y1="1096" x2="340" y2="1122" class="arr" marker-end="url(#arrow)"/>

  <!-- AI decision -->
  <g class="c-amber">
    <rect x="165" y="1122" width="350" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="1142" text-anchor="middle" dominant-baseline="central">enemy_hp &lt;= 24? (below 20%)</text>
    <text class="ts" x="340" y="1162" text-anchor="middle" dominant-baseline="central">Basic AI check</text>
  </g>

  <line x1="165" y1="1150" x2="80" y2="1150" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="80" y1="1150" x2="80" y2="1210" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="87" y="1143" fill="#888">Yes</text>
  <g class="c-teal">
    <rect x="20" y="1210" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="1230" text-anchor="middle" dominant-baseline="central">enemy_potions &gt; 0?</text>
    <text class="ts" x="110" y="1250" text-anchor="middle" dominant-baseline="central">Can the enemy heal?</text>
  </g>
  <line x1="110" y1="1266" x2="110" y2="1296" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="118" y="1285" fill="#888">Yes</text>
  <g class="c-teal">
    <rect x="20" y="1296" width="180" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="110" y="1316" text-anchor="middle" dominant-baseline="central">Enemy heals</text>
    <text class="ts" x="110" y="1334" text-anchor="middle" dominant-baseline="central">+36 HP · enemy_potions -= 1</text>
  </g>
  <line x1="200" y1="1238" x2="230" y2="1238" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="230" y1="1238" x2="230" y2="1296" class="arr" marker-end="url(#arrow)" stroke="#A32D2D"/>
  <text class="ts" x="204" y="1230" fill="#888">No</text>
  <g class="c-red">
    <rect x="222" y="1296" width="118" height="36" rx="8" stroke-width="0.5"/>
    <text class="ts" x="281" y="1314" text-anchor="middle" dominant-baseline="central">No potions msg</text>
  </g>

  <!-- Enemy attacks -->
  <line x1="340" y1="1178" x2="340" y2="1210" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="1198" fill="#888">No</text>
  <g class="c-coral">
    <rect x="215" y="1210" width="250" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="1230" text-anchor="middle" dominant-baseline="central">Enemy attacks hero</text>
    <text class="ts" x="340" y="1250" text-anchor="middle" dominant-baseline="central">damage = generate_damage(15,20)</text>
  </g>
  <line x1="340" y1="1266" x2="340" y2="1296" class="arr" marker-end="url(#arrow)"/>
  <g class="c-coral">
    <rect x="215" y="1296" width="250" height="44" rx="8" stroke-width="0.5"/>
    <text class="ts" x="340" y="1318" text-anchor="middle" dominant-baseline="central">hero_hp -= damage</text>
  </g>

  <!-- Back to while -->
  <line x1="110" y1="1352" x2="110" y2="1390" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="110" y1="1390" x2="30" y2="1390" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="30" y1="1390" x2="30" y2="286" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="30" y1="286" x2="188" y2="286" class="arr" marker-end="url(#arrow)" stroke="#5F5E5A"/>
  <text class="ts" x="34" y="840" fill="#5F5E5A">Back to while</text>
  <line x1="340" y1="1340" x2="340" y2="1390" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="340" y1="1390" x2="30" y2="1390" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Final result -->
  <g class="c-amber">
    <rect x="175" y="1490" width="340" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="345" y="1510" text-anchor="middle" dominant-baseline="central">Final result</text>
    <text class="ts" x="345" y="1530" text-anchor="middle" dominant-baseline="central">hero_hp &lt;= 0 → Hero defeated · else → Hero wins</text>
  </g>
  <line x1="345" y1="1546" x2="345" y2="1572" class="arr" marker-end="url(#arrow)"/>

  <!-- END -->
  <g class="c-teal">
    <rect x="245" y="1572" width="200" height="44" rx="22" stroke-width="0.5"/>
    <text class="th" x="345" y="1594" text-anchor="middle" dominant-baseline="central">END</text>
  </g>
</svg>
  </div>

  <!-- Legend -->
  <div style="max-width:720px;margin:16px auto 0;display:flex;flex-wrap:wrap;gap:10px;font-size:11px;letter-spacing:1px;">
    <span style="color:#9FE1CB;">■ START / HEAL</span>
    <span style="color:#CECBF6;">■ VARIABLES / SPECIAL</span>
    <span style="color:#B5D4F4;">■ FUNCTIONS</span>
    <span style="color:#FAC775;">■ DECISIONS</span>
    <span style="color:#F5C4B3;">■ ATTACKS</span>
    <span style="color:#D3D1C7;">■ HELPERS</span>
    <span style="color:#F7C1C1;">■ ERRORS / MISS</span>
  </div>
</body>
</html>
